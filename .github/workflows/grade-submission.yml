name: "Step 2: Grade Submission"

# Runs on OUR default branch code — secrets available.
# Triggers automatically when Step 1 (detect-submission) completes.
# Only reads student markdown content — never executes student code.

on:
  workflow_run:
    workflows: ["Step 1: Detect Submission"]
    types: [completed]

permissions:
  pull-requests: write
  contents: read
  actions: read

jobs:
  grade:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout grading infrastructure
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/grading/
            rubrics/
            specs/templates/

      - name: Download submission bundle
        uses: actions/download-artifact@v4
        with:
          name: submission-bundle
          path: submission-bundle
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic pyyaml

      - name: Read detection results
        id: detect
        run: |
          python -c "
          import json, os
          d = json.load(open('submission-bundle/detection.json'))
          gh = os.environ.get('GITHUB_OUTPUT', '/dev/null')
          with open(gh, 'a') as f:
              f.write(f\"has_capstone={'true' if d.get('has_capstone') else 'false'}\n\")
              f.write(f\"completed_levels={','.join(d.get('completed_levels', []))}\n\")
          "

      - name: Grade submission with Claude
        id: grade
        if: steps.detect.outputs.has_capstone == 'true'
        run: python .github/grading/grade_submission.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUBMISSION_PATH: submission-bundle/my-work
          RUBRICS_PATH: rubrics
          TEMPLATES_PATH: specs/templates
          COMPLETED_LEVELS: ${{ steps.detect.outputs.completed_levels }}

      - name: Find associated pull request
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            // workflow_run doesn't directly link to the PR, so we find it
            // from the head branch and repo
            const headSha = context.payload.workflow_run.head_sha;
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              sort: 'updated',
              direction: 'desc',
              per_page: 10,
            });
            const pr = pulls.data.find(p => p.head.sha === headSha);
            if (pr) {
              core.setOutput('pr_number', pr.number);
              core.setOutput('found', 'true');
            } else {
              core.setOutput('found', 'false');
            }

      - name: Post grading feedback as PR comment
        if: steps.find-pr.outputs.found == 'true' && steps.detect.outputs.has_capstone == 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.find-pr.outputs.pr_number }}
        with:
          script: |
            const fs = require('fs');
            const feedback = fs.readFileSync('grading-results/feedback.md', 'utf8');
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: feedback,
            });

      - name: Add certified label if passing
        if: steps.find-pr.outputs.found == 'true' && steps.grade.outputs.passing == 'true'
        uses: actions/github-script@v7
        env:
          HIGHEST_LEVEL: ${{ steps.grade.outputs.highest_passing_level }}
          PR_NUMBER: ${{ steps.find-pr.outputs.pr_number }}
        with:
          script: |
            const level = process.env.HIGHEST_LEVEL;
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: [`certified-level-${level}`],
            });

      - name: Record anonymized scores
        if: steps.grade.outputs.passing == 'true'
        run: python .github/grading/record_scores.py
        env:
          STUDENT_HASH: ${{ github.event.workflow_run.head_sha }}
          GRADING_RESULTS: grading-results/scores.json
